<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Olis — join the waitlist. We'll be in touch the moment Olis arrives.">
  <meta name="theme-color" content="#F4ECDC">
  <title>Olis</title>

  <!-- Tab icon: signature-red dot -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Ccircle%20cx='16'%20cy='16'%20r='13'%20fill='%23D81E2C'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════
       TOP BAR — pulsing signature-red brand dot
  ════════════════════════════════════════ -->
  <header>
    <div class="brand-dot" aria-hidden="true"></div>
  </header>

  <!-- ═══════════════════════════════════════
       MAIN — centered Olis mark, maxim, waitlist form
  ════════════════════════════════════════ -->
  <main>
    <div class="logo-wrap">
      <img class="logo-hero" src="olis-logo-black.png" alt="Olis">
      <!-- pulsing halo sitting exactly over the baked-in red dot of the logo -->
      <span class="logo-dot" aria-hidden="true"></span>
    </div>

    <p class="maxim">OLIS was created from the belief that the objects around us should reinforce discipline, not distract from it.</p>

    <form id="waitlist" novalidate>
      <div class="names">
        <input type="text" id="first" name="first" placeholder="First name" autocomplete="given-name" required>
        <input type="text" id="last" name="last" placeholder="Last name" autocomplete="family-name" required>
      </div>
      <div class="field">
        <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
        <button type="submit" id="submit">Opt in</button>
      </div>
      <div class="note" id="note" aria-live="polite"></div>
    </form>

    <div class="success" id="success">
      <div class="dot"></div>
      <h2>You're on the list.</h2>
      <p>Thank you. We'll be in touch the moment Olis arrives.</p>
    </div>
  </main>

  <footer>&copy; Olis</footer>

  <script src="script.js"></script>
</body>
</html>
